spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8082}
spring.application.name=acceso-service

# MySQL
spring.datasource.url=${DB_ACCESO_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update

# JWT — mismo secret que los demas servicios
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# URL del MS Historial (para retornar historial al medico en CU014)
historial.service.url=${HISTORIAL_SERVICE_URL}

# URL base de la app web del medico (configurable por entorno)
acceso.medico.url-base=${ACCESO_MEDICO_URL_BASE:http://localhost:5173/acceso/}
